<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏙️ Эдово - Управление городом</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 2rem;
            overflow: hidden;
            backdrop-filter: blur(2px);
        }
        .header {
            background: #0b2b26;
            padding: 1.2rem;
            text-align: center;
            border-bottom: 3px solid #f4c542;
        }
        .header h1 { color: #ffe3b0; font-size: 2rem; }
        .header p { color: #cbd5e6; margin-top: 0.5rem; }
        .dashboard { display: flex; flex-wrap: wrap; gap: 1.5rem; padding: 1.5rem; }
        .map-panel {
            flex: 2;
            background: #1e2f3a;
            border-radius: 1.5rem;
            padding: 1rem;
        }
        .map-panel h2 { color: #ffd966; margin-bottom: 1rem; }
        canvas {
            width: 100%;
            height: auto;
            background: #2c3e2f;
            border-radius: 1rem;
            cursor: crosshair;
        }
        .complaints-panel {
            flex: 1.2;
            background: #fef9e8;
            border-radius: 1.5rem;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
        }
        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #2c3e50;
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 1rem;
            color: white;
        }
        .stat-number { font-size: 2rem; font-weight: bold; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; }
        .complaints-list {
            max-height: 450px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .ticket {
            background: white;
            border-radius: 1rem;
            padding: 10px 12px;
            border-left: 8px solid;
            position: relative;
        }
        .ticket-active { border-left-color: #d9534f; background: #fff5f5; }
        .ticket-closed { border-left-color: #5cb85c; background: #f0f9f0; opacity: 0.7; }
        .ticket-building { font-weight: bold; padding-right: 70px; }
        .ticket-type {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: white;
            margin: 6px 0;
        }
        .type-police { background: #c0392b; }
        .type-ambulance { background: #2980b9; }
        .type-workers { background: #e67e22; }
        .ticket-time { font-size: 0.65rem; color: #5d6d7e; }
        .refresh-btn {
            background: #f4c542;
            border: none;
            padding: 6px 14px;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 10px;
        }
        .last-updated {
            text-align: center;
            padding: 10px;
            font-size: 0.7rem;
            color: #acb8c5;
        }
        .error-msg {
            text-align: center;
            padding: 40px;
            color: #ffaa88;
        }
        footer {
            text-align: center;
            padding: 14px;
            background: #0b2b26;
            color: #acb8c5;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏙️ ЭДОВО | Сити-менеджмент</h1>
        <p>Данные синхронизируются с десктоп-приложением через GitHub</p>
    </div>
    <div class="dashboard">
        <div class="map-panel">
            <h2>🗺️ Карта города</h2>
            <canvas id="cityCanvas" width="720" height="500" style="width:100%; height:auto; aspect-ratio:720/500"></canvas>
            <button class="refresh-btn" onclick="loadData()">⟳ Обновить данные</button>
        </div>
        <div class="complaints-panel">
            <h2 style="margin:0 0 8px 0;">📋 Жалобы и вызовы</h2>
            <div class="stats" id="statsPanel"></div>
            <div id="complaintsContainer" class="complaints-list">Загрузка...</div>
            <div class="last-updated" id="lastUpdated">--</div>
        </div>
    </div>
    <footer>📡 Данные загружаются из city_data.json из этого репозитория. Обновляйте данные через десктоп-приложение и кнопку "Сохранить на GitHub".</footer>
</div>

<script>
    const canvas = document.getElementById('cityCanvas');
    const ctx = canvas.getContext('2d');
    let cityData = { buildings: [], complaints: [] };
    const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/forumvmatr67-oss/matr-911/main/city_data.json';

    async function loadData() {
        try {
            document.getElementById('complaintsContainer').innerHTML = '<div class="error-msg">⏳ Загрузка с GitHub...</div>';
            const response = await fetch(GITHUB_RAW_URL + '?_=' + Date.now());
            if (!response.ok) throw new Error('HTTP ' + response.status);
            cityData = await response.json();
            drawMap();
            renderComplaints();
            updateStats();
            document.getElementById('lastUpdated').innerHTML = `🕐 Обновлено: ${new Date().toLocaleString()}`;
        } catch (err) {
            console.error(err);
            document.getElementById('complaintsContainer').innerHTML = `<div class="error-msg">❌ Ошибка загрузки: ${err.message}<br>Убедитесь, что файл city_data.json есть в репозитории.</div>`;
        }
    }

    function drawMap() {
        if (!cityData.buildings) return;
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = "#3a5a45";
        ctx.fillRect(0, 0, w, h);
        
        cityData.buildings.forEach(b => {
            const x = b.x, y = b.y;
            const hasActive = cityData.complaints?.some(c => c.buildingId === b.id && c.status === "active") || false;
            let fillColor;
            if (b.type === "house") fillColor = hasActive ? "#e68373" : "#b0c4b5";
            else fillColor = hasActive ? "#f5b06b" : "#65b891";
            
            ctx.fillStyle = fillColor;
            ctx.fillRect(x-38, y-18, 76, 36);
            ctx.strokeRect(x-38, y-18, 76, 36);
            ctx.fillStyle = "#1f2a1b";
            ctx.font = "bold 11px 'Segoe UI'";
            ctx.fillText(b.name, x-30, y+4);
            
            if (hasActive) {
                ctx.fillStyle = "#d64531";
                ctx.beginPath();
                ctx.arc(x+32, y-12, 9, 0, 2*Math.PI);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.font = "bold 12px monospace";
                ctx.fillText("!", x+28, y-9);
            }
        });
    }

    function renderComplaints() {
        const container = document.getElementById("complaintsContainer");
        if (!cityData.complaints || cityData.complaints.length === 0) {
            container.innerHTML = `<div style="text-align:center;padding:30px;">✨ Нет активных жалоб</div>`;
            return;
        }
        const sorted = [...cityData.complaints].sort((a,b) => {
            if (a.status === "active" && b.status !== "active") return -1;
            if (a.status !== "active" && b.status === "active") return 1;
            return new Date(b.timestamp) - new Date(a.timestamp);
        });
        container.innerHTML = "";
        sorted.forEach(compl => {
            const div = document.createElement("div");
            div.className = `ticket ${compl.status === "active" ? "ticket-active" : "ticket-closed"}`;
            const typeLabel = compl.typeRu || (compl.type === "police" ? "Полиция" : compl.type === "ambulance" ? "Скорая" : "Рабочие");
            div.innerHTML = `
                <div class="ticket-building">🏢 ${compl.buildingName}</div>
                <div class="ticket-type type-${compl.type}">${typeLabel}</div>
                <div class="ticket-time">⏱️ ${new Date(compl.timestamp).toLocaleString()}</div>
                ${compl.status === "active" ? '<div style="font-size:0.7rem; margin-top:5px; color:#d9534f;">⏳ Ожидает реакции</div>' : '<div style="font-size:0.7rem; margin-top:5px; color:#5cb85c;">✅ Закрыт</div>'}
            `;
            container.appendChild(div);
        });
    }

    function updateStats() {
        const statsDiv = document.getElementById("statsPanel");
        if (!cityData.complaints) return;
        const total = cityData.complaints.length;
        const active = cityData.complaints.filter(c => c.status === "active").length;
        const closed = total - active;
        statsDiv.innerHTML = `
            <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">Всего</div></div>
            <div class="stat-card"><div class="stat-number">${active}</div><div class="stat-label">Активных</div></div>
            <div class="stat-card"><div class="stat-number">${closed}</div><div class="stat-label">Закрытых</div></div>
        `;
    }

    // Автообновление каждые 30 секунд
    loadData();
    setInterval(loadData, 30000);
</script>
</body>
</html>
